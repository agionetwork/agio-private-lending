<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="circle-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2BD8B7"/>
      <stop offset="0.55" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Outer ring with a notch on the right (the iconic Circle "Q-shape"). -->
  <path
    fill="none"
    stroke="url(#circle-grad)"
    stroke-width="6"
    stroke-linecap="round"
    d="M48.2 19.6
       A22 22 0 1 0 48.2 44.4"
  />
  <!-- Inner ring, mirrored gap. -->
  <path
    fill="none"
    stroke="url(#circle-grad)"
    stroke-width="6"
    stroke-linecap="round"
    d="M22.4 47.4
       A14 14 0 1 1 22.4 16.6"
  />
</svg>
